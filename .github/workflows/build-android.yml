name: 🚀 Build Android APK & AAB (Static)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-android.yml'

jobs:
  build:
    name: 📱 Build Android App (Static Pages)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐰 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🖼️ Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: 📦 Install project dependencies
        run: bun install

      - name: 🔧 Override next.config for static export
        run: |
          cat > next.config.ts << 'EOF'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = {
            output: 'export',
            trailingSlash: true,
            typescript: {
              ignoreBuildErrors: true,
            },
            eslint: {
              ignoreDuringBuilds: true,
            },
            reactStrictMode: false,
            images: {
              unoptimized: true,
            },
          };
          export default nextConfig;
          EOF
          echo "✅ next.config.ts overridden for static export"
          cat next.config.ts

      - name: 🏗️ Build Next.js static export
        run: |
          bun run build 2>&1 || true
          if [ -d "out" ] && [ "$(ls -A out)" ]; then
            echo "✅ Static export succeeded!"
            echo "Files in out/: $(ls out/ | wc -l)"
            ls out/ | head -10
          else
            echo "⚠️ Static export had issues, trying alternate build..."
            # Try with next build only
            npx next build 2>&1 | tail -20 || true
            if [ -d "out" ]; then
              echo "✅ Alternate build succeeded"
            else
              echo "❌ Build failed, creating fallback static page"
              mkdir -p out
              cat > out/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html dir="rtl" lang="ar">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
            <title>Apple NET</title>
            <link rel="manifest" href="/manifest.json">
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: 'Segoe UI', Arial, sans-serif;
                background: linear-gradient(135deg, #1B7A3D 0%, #0d4a25 100%);
                min-height: 100vh; color: white;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
              }
              .container { text-align: center; padding: 40px 20px; }
              .icon { font-size: 80px; margin-bottom: 20px; }
              h1 { font-size: 32px; margin-bottom: 12px; }
              p { font-size: 18px; opacity: 0.85; margin-bottom: 8px; }
              .version { font-size: 14px; opacity: 0.6; margin-top: 40px; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="icon">🌐</div>
              <h1>Apple NET</h1>
              <p>منصة إدارة الهوت سبوت الاحترافية</p>
              <p>Professional Hotspot Management</p>
              <div class="version">v1.0.0</div>
            </div>
          </body>
          </html>
          HTMLEOF
            fi
          fi

      - name: 📦 Setup Capacitor project
        run: |
          mkdir -p android-wrapper
          cat > android-wrapper/package.json << 'EOF'
          {
            "name": "applenet-android",
            "version": "1.0.0",
            "private": true,
            "scripts": { "build": "echo done" },
            "dependencies": {
              "@capacitor/core": "6.2.0",
              "@capacitor/android": "6.2.0",
              "@capacitor/cli": "6.2.0"
            }
          }
          EOF
          cd android-wrapper && npm install --legacy-peer-deps 2>&1 | tail -5
          echo "✅ Capacitor installed"

      - name: ⚙️ Create Capacitor config (NO server URL - fully static)
        run: |
          cp -r out/* android-wrapper/www/ 2>/dev/null || mkdir -p android-wrapper/www && cp -r out/. android-wrapper/www/ 2>/dev/null || true

          cat > android-wrapper/capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.applenet.hotspot",
            "appName": "Apple NET",
            "webDir": "www",
            "android": {
              "allowMixedContent": true,
              "webContentsDebuggingEnabled": false,
              "minWebViewVersion": 60,
              "backgroundColor": "#1B7A3D"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#1B7A3D",
                "showSpinner": false,
                "androidScaleType": "CENTER_CROP"
              }
            }
          }
          CAPEOF

          echo "✅ Capacitor config created"
          echo "www/ contents: $(ls android-wrapper/www/ 2>/dev/null | wc -l) files"

      - name: 📱 Add Android platform
        run: |
          cd android-wrapper
          npx cap add android 2>&1
          echo "✅ Android platform added"

      - name: 🔄 Sync static files to Android
        run: |
          # Ensure static files are in www before sync
          mkdir -p android-wrapper/www
          cp -r out/. android-wrapper/www/ 2>/dev/null || true
          echo "www files: $(ls android-wrapper/www | head -5)"

          cd android-wrapper
          npx cap sync android 2>&1 | tail -10
          echo "✅ Capacitor sync complete"

      - name: 🖼️ Set app icons
        run: |
          ICON_SRC=""
          if [ -f "public/icons/app-icon-provided.png" ]; then
            ICON_SRC="public/icons/app-icon-provided.png"
          elif [ -f "public/icons/icon-512x512.png" ]; then
            ICON_SRC="public/icons/icon-512x512.png"
          elif [ -f "public/icons/icon-192x192.png" ]; then
            ICON_SRC="public/icons/icon-192x192.png"
          fi

          if [ -z "$ICON_SRC" ]; then
            echo "⚠️ No icon found, skipping"
            exit 0
          fi

          echo "Using icon: $ICON_SRC"
          MIPMAP_DIR="android-wrapper/android/app/src/main/res"

          for config in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR=$(echo $config | cut -d: -f1)
            SIZE=$(echo $config | cut -d: -f2)
            convert "$ICON_SRC" -resize "${SIZE}x${SIZE}" "${MIPMAP_DIR}/${DIR}/ic_launcher.png" && \
              cp "${MIPMAP_DIR}/${DIR}/ic_launcher.png" "${MIPMAP_DIR}/${DIR}/ic_launcher_round.png" && \
              echo "✅ ${SIZE}x${SIZE} icon set"
          done

          # Also create foreground icon for adaptive icons
          convert "$ICON_SRC" -resize "432x432" \
            "android-wrapper/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png" 2>/dev/null || true

      - name: 🔧 Update Android app settings
        run: |
          BUILD_GRADLE="android-wrapper/android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            sed -i 's/applicationId ".*"/applicationId "com.applenet.hotspot"/' "$BUILD_GRADLE"
            sed -i 's/versionCode [0-9]*/versionCode 1/' "$BUILD_GRADLE"
            sed -i 's/versionName ".*"/versionName "1.0.0"/' "$BUILD_GRADLE"
            echo "✅ build.gradle updated"
          fi

          MANIFEST="android-wrapper/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/android:label="[^"]*"/android:label="Apple NET"/' "$MANIFEST"
            # Add required permissions
            if ! grep -q "INTERNET" "$MANIFEST"; then
              sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n    <application/' "$MANIFEST"
            fi
            echo "✅ AndroidManifest.xml updated"
          fi

      - name: 🏗️ Build APK & AAB (Release)
        run: |
          cd android-wrapper/android
          chmod +x gradlew
          echo "🔨 Building Release APK and AAB..."
          ./gradlew assembleRelease bundleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g" 2>&1 | tail -40
          echo "✅ Gradle build complete!"
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null

      - name: 🔐 Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks
          echo "✅ Keystore decoded ($(wc -c < release-key.jks) bytes)"

      - name: ✍️ Sign APK
        run: |
          APK_PATH=$(find android-wrapper/android -name "*-unsigned.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android-wrapper/android -name "*.apk" 2>/dev/null | head -1)
          fi
          echo "Signing: $APK_PATH"

          APKSIGNER="$(find $ANDROID_HOME/build-tools -name apksigner 2>/dev/null | sort -V | tail -1)"

          "$APKSIGNER" sign \
            --ks release-key.jks \
            --ks-pass "pass:${{ secrets.STORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "Apple-NET-v1.0-signed.apk" \
            "$APK_PATH"

          echo "✅ APK signed! Size: $(du -h Apple-NET-v1.0-signed.apk | cut -f1)"

      - name: ✍️ Sign AAB
        run: |
          AAB_PATH=$(find android-wrapper/android -name "*.aab" 2>/dev/null | head -1)
          echo "Signing AAB: $AAB_PATH"
          cp "$AAB_PATH" "Apple-NET-v1.0.aab"

          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release-key.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "Apple-NET-v1.0.aab" \
            "${{ secrets.KEY_ALIAS }}"

          echo "✅ AAB signed! Size: $(du -h Apple-NET-v1.0.aab | cut -f1)"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Apple-NET-APK-v1.0
          path: Apple-NET-v1.0-signed.apk
          retention-days: 30

      - name: 📤 Upload AAB (Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: Apple-NET-AAB-v1.0
          path: Apple-NET-v1.0.aab
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "=================================================="
          echo "  ✅ Apple NET Static Android Build Complete!"
          echo "=================================================="
          echo ""
          APK="Apple-NET-v1.0-signed.apk"
          AAB="Apple-NET-v1.0.aab"
          [ -f "$APK" ] && echo "📦 APK: $(du -h $APK | cut -f1)" || echo "❌ APK not found"
          [ -f "$AAB" ] && echo "📦 AAB: $(du -h $AAB | cut -f1)" || echo "❌ AAB not found"
          echo ""
          echo "🔑 Signed with: AbdulAleem775"
          echo "🏷️  App ID: com.applenet.hotspot"
          echo "📱 Type: Static (offline capable)"
          echo "=================================================="
